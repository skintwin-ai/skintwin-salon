name: E2E Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Run nightly at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '18'

jobs:
  build:
    name: Build for E2E
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build Gatsby site
        run: yarn build
        env:
          GATSBY_AUTH_KEY: ${{ secrets.GATSBY_AUTH_KEY }}
          GATSBY_BASE_API: ${{ vars.GATSBY_BASE_API || 'https://api.paystack.co' }}
          GATSBY_PUSHER_KEY: ${{ secrets.GATSBY_PUSHER_KEY }}
          GATSBY_PUSHER_APP_ID: ${{ secrets.GATSBY_PUSHER_APP_ID }}
          GATSBY_PUSHER_SECRET: ${{ secrets.GATSBY_PUSHER_SECRET }}
          GATSBY_TERMINAL_ID: ${{ secrets.GATSBY_TERMINAL_ID }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gatsby-build-e2e
          path: public/
          retention-days: 1

  e2e-chromium:
    name: E2E - Chromium
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: gatsby-build-e2e
          path: public/

      - name: Run E2E tests on Chromium
        run: yarn e2e --project=chromium

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-chromium
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  e2e-firefox:
    name: E2E - Firefox
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Install Playwright browsers
        run: npx playwright install firefox --with-deps

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: gatsby-build-e2e
          path: public/

      - name: Run E2E tests on Firefox
        run: yarn e2e --project=firefox

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-firefox
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  e2e-webkit:
    name: E2E - WebKit
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Install Playwright browsers
        run: npx playwright install webkit --with-deps

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: gatsby-build-e2e
          path: public/

      - name: Run E2E tests on WebKit
        run: yarn e2e --project=webkit

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-webkit
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  e2e-mobile:
    name: E2E - Mobile
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Install Playwright browsers
        run: npx playwright install chromium webkit --with-deps

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: gatsby-build-e2e
          path: public/

      - name: Run E2E tests on Mobile
        run: yarn e2e --project=mobile-chrome --project=mobile-safari

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-mobile
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  accessibility:
    name: Accessibility Tests
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: gatsby-build-e2e
          path: public/

      - name: Run accessibility tests
        run: yarn e2e --project=chromium --grep="@accessibility"
        continue-on-error: true

      - name: Upload accessibility report
        uses: actions/upload-artifact@v4
        with:
          name: accessibility-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
