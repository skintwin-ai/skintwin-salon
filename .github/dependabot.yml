# Dependabot configuration for automated dependency updates
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates

version: 2
updates:
  # JavaScript/npm dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "javascript"
    commit-message:
      prefix: "chore(deps)"
    groups:
      # Group minor and patch updates for production dependencies
      production-minor:
        patterns:
          - "*"
        exclude-patterns:
          - "@playwright/*"
          - "playwright"
          - "vitest"
          - "@vitest/*"
          - "eslint*"
          - "prettier"
          - "typescript"
          - "@types/*"
          - "@testing-library/*"
        update-types:
          - "minor"
          - "patch"
      # Group test/dev tool updates
      testing-tools:
        patterns:
          - "@playwright/*"
          - "playwright"
          - "vitest"
          - "@vitest/*"
          - "@testing-library/*"
        update-types:
          - "minor"
          - "patch"
      # Group linting tools
      linting:
        patterns:
          - "eslint*"
          - "prettier"
          - "@typescript-eslint/*"
        update-types:
          - "minor"
          - "patch"
      # Group TypeScript types
      types:
        patterns:
          - "@types/*"
        update-types:
          - "minor"
          - "patch"
    ignore:
      # Ignore major version updates for Gatsby (requires manual upgrade)
      - dependency-name: "gatsby"
        update-types: ["version-update:semver-major"]
      - dependency-name: "gatsby-*"
        update-types: ["version-update:semver-major"]
      # Ignore major updates for React (requires testing)
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(ci)"
    groups:
      # Group all GitHub Actions updates together
      github-actions:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
